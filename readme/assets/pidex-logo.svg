<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">PIDEX animated logo</title>
  <desc id="desc">The PIDEX dashboard logo: a central pi-like mark with softly orbiting copies.</desc>
  <defs>
    <path id="pi-mark" d="M 15,20 C 12,10 25,10 35,12 L 85,12 C 92,12 92,20 85,20 L 28,20 M 42,20 C 40,40 35,70 20,88 C 18,92 12,90 15,85 C 28,68 32,40 35,20 M 65,20 C 65,45 66,70 76,86 C 78,89 82,90 84,87 C 86,84 85,81 83,78 C 75,68 73,50 73,20" />
    <filter id="core-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.6" />
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00f5ff" flood-opacity="0.45" />
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#a78bfa" flood-opacity="0.28" />
    </filter>
    <style>
      .logo { color: #f8fafc; filter: drop-shadow(0 0 8px rgba(0, 245, 255, 0.25)); }
      .orbit { transform-origin: 60px 60px; animation: orbit 18s linear infinite; opacity: .92; }
      .ghost { fill: currentColor; stroke: currentColor; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; opacity: .28; }
      .core { fill: currentColor; stroke: currentColor; stroke-width: 5.5; stroke-linecap: round; stroke-linejoin: round; filter: url(#core-glow); }
      @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { .orbit { animation: none; } }
    </style>
  </defs>

  <g class="logo">
    <g class="orbit">
      <use href="#pi-mark" class="ghost" transform="translate(60 30) rotate(0) scale(.24) translate(-50 -50)" />
      <use href="#pi-mark" class="ghost" transform="translate(81 39) rotate(45) scale(.24) translate(-50 -50)" />
      <use href="#pi-mark" class="ghost" transform="translate(90 60) rotate(90) scale(.24) translate(-50 -50)" />
      <use href="#pi-mark" class="ghost" transform="translate(81 81) rotate(135) scale(.24) translate(-50 -50)" />
      <use href="#pi-mark" class="ghost" transform="translate(60 90) rotate(180) scale(.24) translate(-50 -50)" />
      <use href="#pi-mark" class="ghost" transform="translate(39 81) rotate(225) scale(.24) translate(-50 -50)" />
      <use href="#pi-mark" class="ghost" transform="translate(30 60) rotate(270) scale(.24) translate(-50 -50)" />
      <use href="#pi-mark" class="ghost" transform="translate(39 39) rotate(315) scale(.24) translate(-50 -50)" />
    </g>

    <use href="#pi-mark" class="core" transform="translate(60 60) scale(.58) translate(-50 -50)" />
  </g>
</svg>
