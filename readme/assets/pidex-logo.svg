<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">PIDEX animated logo</title>
  <desc id="desc">A central Pi-like mark with orbiting translucent marks.</desc>
  <defs>
    <path id="pi-mark" d="M 15,20 C 12,10 25,10 35,12 L 85,12 C 92,12 92,20 85,20 L 28,20 M 42,20 C 40,40 35,70 20,88 C 18,92 12,90 15,85 C 28,68 32,40 35,20 M 65,20 C 65,45 66,70 76,86 C 78,89 82,90 84,87 C 86,84 85,81 83,78 C 75,68 73,50 73,20" />
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#00f5ff" flood-opacity="0.58" />
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#a78bfa" flood-opacity="0.38" />
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.55" />
    </filter>
    <style>
      .orbiter { transform-origin: 60px 60px; animation: orbit 9s linear infinite; }
      .pulse { transform-origin: 60px 60px; animation: pulse 3.8s ease-in-out infinite; }
      .ghost { fill: none; stroke: #7dd3fc; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; opacity: .22; }
      .core { fill: none; stroke: #f8fafc; stroke-width: 5.5; stroke-linecap: round; stroke-linejoin: round; filter: url(#glow); }
      @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { transform: scale(.98); opacity: .95; } 50% { transform: scale(1.04); opacity: 1; } }
      @media (prefers-reduced-motion: reduce) { .orbiter, .pulse { animation: none; } }
    </style>
  </defs>

  <rect width="120" height="120" rx="28" fill="#030712" opacity="0.92" />
  <circle cx="60" cy="60" r="44" fill="none" stroke="#00f5ff" stroke-opacity="0.12" />

  <g class="orbiter">
    <use href="#pi-mark" class="ghost" transform="translate(60 22) rotate(0) scale(.19) translate(-50 -50)" />
    <use href="#pi-mark" class="ghost" transform="translate(87 33) rotate(45) scale(.21) translate(-50 -50)" />
    <use href="#pi-mark" class="ghost" transform="translate(98 60) rotate(90) scale(.19) translate(-50 -50)" />
    <use href="#pi-mark" class="ghost" transform="translate(87 87) rotate(135) scale(.21) translate(-50 -50)" />
    <use href="#pi-mark" class="ghost" transform="translate(60 98) rotate(180) scale(.19) translate(-50 -50)" />
    <use href="#pi-mark" class="ghost" transform="translate(33 87) rotate(225) scale(.21) translate(-50 -50)" />
    <use href="#pi-mark" class="ghost" transform="translate(22 60) rotate(270) scale(.19) translate(-50 -50)" />
    <use href="#pi-mark" class="ghost" transform="translate(33 33) rotate(315) scale(.21) translate(-50 -50)" />
  </g>

  <g class="pulse">
    <use href="#pi-mark" class="core" transform="translate(60 60) scale(.58) translate(-50 -50)" />
  </g>
</svg>
