const isHistoricalProvider=(value)=>{const normalized=String(value||'').toLowerCase();return HISTORICAL_PROVIDER_HINTS.some(h=>normalized.includes(h)&&!normalized.includes('codex'));};
const providerSortKey=(value)=>{const normalized=String(value||'').toLowerCase();for(let i=0;i<PROVIDER_HINTS_SORT.length;i++){if(normalized.startsWith(PROVIDER_HINTS_SORT[i]))return[i,normalized];}if(!normalized)return[PROVIDER_HINTS_SORT.length,""];return[PROVIDER_HINTS_SORT.length,normalized]};
const api=async(path,opt)=>{const r=await fetch(path,opt);if(!r.ok)throw new Error(await r.text());return r.json()};
const post=(path,data)=>api(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data||{})});
const fmt=v=>v==null?'—':String(v); const money=n=>n==null?'—':`$${Number(n).toFixed(2)}`; const tok=n=>n==null?'—':new Intl.NumberFormat().format(Math.max(0,Math.round(Number(n))));

function esc(s){return String(s??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function mdToHtml(md){let html='',code=false;const lines=String(md||'').split('\n');for(const line of lines){if(line.startsWith('```')){html+=code?'</code></pre>':'<pre><code>';code=!code;continue}if(code){html+=esc(line)+'\n';continue}if(/^###\s+/.test(line))html+=`<h3>${esc(line.replace(/^###\s+/,''))}</h3>`;else if(/^##\s+/.test(line))html+=`<h2>${esc(line.replace(/^##\s+/,''))}</h2>`;else if(/^#\s+/.test(line))html+=`<h1>${esc(line.replace(/^#\s+/,''))}</h1>`;else if(/^[-*]\s+/.test(line))html+=`<p>• ${esc(line.replace(/^[-*]\s+/,''))}</p>`;else if(/^>\s?/.test(line))html+=`<blockquote>${esc(line.replace(/^>\s?/,''))}</blockquote>`;else if(line.trim())html+=`<p>${esc(line)}</p>`}return html+(code?'</code></pre>':'')}
function qs(project){return project?'?project='+encodeURIComponent(project):''}

function useAllData(project, { showHistoricalProviders = false } = {}){const [d,setD]=useState({loading:true,error:null});const load=async(forceLimits=false)=>{try{setD(x=>({...x,loading:!x.summary,error:null}));const q=qs(project);const historical=showHistoricalProviders?'1':'0';const [projects,summary,live,limits,secondary,pipelines,analysisReports,analysisPlans,charts,malformed,runs,modelQuality]=await Promise.all([api('/api/projects'),api('/api/summary'+q),api('/api/live'+q),api('/api/provider-limits'+(forceLimits?`?show_historical=${historical}&refresh=1`:`?show_historical=${historical}`)),api('/api/secondary'+q),api('/api/pipelines'+q),api('/api/analysis'),api('/api/analysis/plans'),api('/api/charts/quality'+q),api('/api/malformed'+q),api('/api/runs'+(q?`${q}&show_historical=${historical}&limit=500`:`?show_historical=${historical}&limit=500`)),api('/api/charts/model-quality'+q)]);setD({loading:false,error:null,projects,summary,live,limits,secondary,pipelines,analysisReports,analysisPlans,charts,malformed,runs,modelQuality})}catch(error){setD(x=>({...x,loading:false,error}))}};useEffect(()=>{load(false);const t=setInterval(()=>load(false),30000);return()=>clearInterval(t)},[project,showHistoricalProviders]);return[d,load]}

function Analysis({reports=[],plans=[]}){const [kind,setKind]=useState('llm'),[path,setPath]=useState(''),[doc,setDoc]=useState(null);const items=kind==='plans'?plans:reports;useEffect(()=>{setPath(items[0]?.path||'')},[kind,reports,plans]);useEffect(()=>{if(!path){setDoc(null);return}api('/api/analysis/document?path='+encodeURIComponent(path)).then(setDoc).catch(e=>setDoc({path:'error',markdown:e.message}))},[path]);return <Panel className="card full"><div className="submenu"><button className={kind==='llm'?'active':''} onClick={()=>setKind('llm')}>LLM Analytics</button><button className={kind==='plans'?'active':''} onClick={()=>setKind('plans')}>Implementation Plans</button></div><br/><div className="analysis-layout"><aside className="analysis-menu">{items.map(it=><motion.button layout key={it.path} className={`action analysis-item ${path===it.path?'active':''}`} onClick={()=>setPath(it.path)} whileHover={{x:4}}><b>{kind==='plans'?(it.title||it.path):(it.plan_key||'unknown')}</b><br/><span className="muted mini">{kind==='plans'?it.path:`${it.verdict||'n/a'} · ${it.confidence||'n/a'}`}</span></motion.button>)}</aside><article className="reader glass" dangerouslySetInnerHTML={{__html:doc?`<h3>${esc(doc.path)}</h3>`+mdToHtml(doc.markdown):'<div class="muted">No document.</div>'}}/></div></Panel>}

function Live({live={},openDoc}){return <div className="grid"><Metric label="Status" value={live.summary?.pending_gate?'Gate pending':live.summary?.running_pipelines?'Running':live.summary?.unresolved_inferred?'Unresolved analytics':'Idle'} /><Metric label="Running pipelines" value={live.summary?.running_pipelines||0}/><Metric label="Unresolved inferred" value={live.summary?.unresolved_inferred||0}/><Metric label="Pending gate" value={live.summary?.pending_gate?'yes':'no'} cls={live.summary?.pending_gate?'warn':''}/><Panel className="card full"><h2>Pipeline Lifecycle / Unresolved Analytics</h2><DataTable rows={live.open_pipelines||[]} cols={[{k:'project',l:'Project'},{k:'plan_key',l:'Plan'},{k:'pipeline_id',l:'Pipeline ID'},{k:'status',l:'Status'},{k:'source',l:'Source'},{k:'started_at',l:'Started'},{k:'last_at',l:'Last event'},{k:'agent_runs',l:'Runs'},{k:'last_agent',l:'Last actor/agent'},{k:'message',l:'Message'}]}/></Panel><Panel className="card full"><h2>Latest Agent Heartbeats</h2><DataTable rows={live.latest_by_agent||[]} cols={[{k:'timestamp',l:'Time'},{k:'project',l:'Project'},{k:'plan_key',l:'Plan'},{k:'agent',l:'Agent'},{k:'provider',l:'Provider'},{k:'model',l:'Model'},{k:'verdict',l:'Verdict'},{k:'route_to',l:'Route'},{k:'gate',l:'Gate'},{k:'duration_ms',l:'Runtime',f:runtime}]}/></Panel><Panel className="card full"><h2>Latest Runs</h2><LiveRuns runs={live.latest_runs||[]}/></Panel><Panel className="card full"><h2>Recent Secondary Artifacts</h2><DataTable rows={live.recent_secondary||[]} cols={[{k:'mtime',l:'Time'},{k:'project',l:'Project'},{k:'plan_key',l:'Plan'},{k:'role',l:'Role'},{k:'model_label',l:'Model'},{k:'verdict',l:'Verdict'},{k:'route_to',l:'Route'},{k:'gate',l:'Gate'},{k:'has_routing',l:'Routing'},{k:'path',l:'Path'}]}/></Panel><Panel className="card full"><h2>Current State JSON</h2><pre>{JSON.stringify({active_lead:live.active_lead,pending_gate:live.pending_gate,summary:live.summary},null,2)}</pre></Panel></div>}
function LiveRuns({runs=[]}){return <div><AnimatePresence initial={false}>{runs.slice(0,20).map((r,i)=><motion.div layout className="run" key={`${r.timestamp}-${r.agent}-${i}`} initial={{opacity:0,y:8}} animate={{opacity:1,y:0}} exit={{opacity:0,height:0}} transition={{delay:Math.min(i*.018,.18)}}><div><span className="badge"><span className={`dot ${r.exit_code?'bad':''}`}></span>{ago(r.timestamp)}</span></div><div><b>{r.agent||'—'}</b><br/><span className="muted">{r.project}</span></div><div><span className="code">{r.plan_key||'no-plan'}</span><br/><span className="muted">{r.model||r.provider||'—'}</span></div><div><b>{r.verdict||'—'}</b><br/><span className="muted">{runtime(r.duration_ms)}</span></div></motion.div>)}</AnimatePresence></div>}
function Limits({data,onRefresh}){const [switching,setSwitching]=useState(null);const records=data.limits?.records||[];const doSwitch=async(profile)=>{setSwitching(profile);try{await post('/api/provider-limits/profile',{profile});await onRefresh(true)}finally{setSwitching(null)}};return <div className="grid"><Metric label="Active profile" value={data.limits?.active_profile||'custom'} wide/><Metric label="Recommended" value={data.limits?.recommended_profile||'n/a'} wide/><Panel className="card full"><div style={{display:'flex',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}><div><div className="label">Provider Limits</div><h2>Codex + Spark + Anthropic + OpenRouter quota &amp; spend</h2><div className="chart-note">Recommendation: <b>{data.limits?.recommended_profile||'n/a'}</b>{data.limits?.recommended_profile_reason?` — ${data.limits.recommended_profile_reason}`:''}</div></div><div className="submenu">{(data.limits?.profiles||[]).map(p=><motion.button key={p} className={`action ${p===data.limits?.active_profile?'active':''}`} whileHover={{scale:1.03}} whileTap={{scale:.97}} onClick={()=>doSwitch(p)} disabled={!!switching}>{switching===p?'Switching…':p}</motion.button>)}<button className="action" onClick={()=>onRefresh(true)}>Refresh</button></div></div><div className="rows">{records.map(r=><motion.div layout key={`${r.provider}-${r.window}`} className="row" initial={{opacity:0,x:-10}} animate={{opacity:1,x:0}}><div><b>{r.provider}</b><br/><span className="muted">{r.limit_name||r.window}</span></div><div><div className="bar"><motion.div initial={{width:0}} animate={{width:`${Math.min(100,r.used_percent||0)}%`}} transition={{type:'spring',stiffness:90,damping:18}}/></div><div className="muted mini">{r.provider==='openrouter'?`$${Number(r.usage||0).toFixed(2)} spent`:`reset in ${duration(r.reset_after_seconds)} · projected ${r.projected_exhaustion_at||'n/a'}`}</div></div><span className="badge"><span className={`dot ${(r.limit_reached||r.status==='danger')?'bad':(r.used_percent>=80?'warn':(r.provider==='openrouter'?'good':''))}`}></span>{r.used_percent!=null?`${r.used_percent}%`:`$${Number(r.usage||0).toFixed(2)}`} · {r.plan||r.status||'unknown'}</span></motion.div>)}</div></Panel><Panel className="card full"><DataTable rows={records} cols={[{k:'provider',l:'Provider'},{k:'window',l:'Window'},{k:'limit_name',l:'Limit'},{k:'plan',l:'Plan'},{k:'usage',l:'Spend ($)',f:v=>v==null?'—':Number(v).toFixed(2)},{k:'used_percent',l:'Used %'},{k:'status',l:'Status'},{k:'resets_at',l:'Resets at'},{k:'reset_after_seconds',l:'Reset in',f:duration},{k:'burn_percent_per_hour',l:'Burn %/h'},{k:'projected_exhaustion_at',l:'Projected 100%'},{k:'projected_before_reset',l:'Before reset?'},{k:'error',l:'Error'}]}/></Panel></div>}
function visibleProjects(projects=[]){return projects.filter(p=>{
  const name=String(p.name||'').toLowerCase(), path=String(p.path||'').toLowerCase();
  return !['daniel','root','running-pi'].includes(name) && !path.endsWith('/home/daniel') && !path.endsWith('/running-pi');
})}
function LiquidGlassProbe(){const ref=useRef(null);useEffect(()=>{if(!ref.current||!window.LiquidGlassButton||ref.current.dataset.ready)return;ref.current.dataset.ready='1';try{const b=new window.LiquidGlassButton({text:'π',size:18,type:'circle',tintOpacity:.26,warp:true,onClick:()=>{}});b.element.style.transform='scale(.62)';b.element.style.pointerEvents='none';ref.current.appendChild(b.element)}catch(e){console.warn('Liquid glass probe failed',e)}},[]);return <span className="liquid-probe" ref={ref} aria-hidden="true"/>}
function ProjectMenu({projects=[],project,setProject}){const list=visibleProjects(projects);return <div className="project-menu"><motion.button className={`action ${project===''?'active':''}`} whileHover={{scale:1.03}} whileTap={{scale:.97}} onClick={()=>setProject('')}>All Projects</motion.button>{list.map(p=><motion.button key={p.path} title={p.path} className={`action ${project===p.name?'active':''}`} whileHover={{scale:1.03}} whileTap={{scale:.97}} onClick={()=>setProject(p.name)}>{p.name}</motion.button>)}</div>}
function CompletionBox({data}){const summary=data.summary||{},live=data.live||{};const completion=summary.pipeline_runs_started?Math.round(summary.pipeline_runs_completed/summary.pipeline_runs_started*100):0;const codexWeek=(data.limits?.records||[]).find(r=>r.provider==='codex'&&r.window==='seven_day');return <><div><div className="label">Completion</div><div className="big-number">{completion}%</div><div className="muted mini">{summary.pipeline_runs||'—'} · live {live.summary?.running_pipelines||0}</div></div><div className="bar"><motion.div initial={{width:0}} animate={{width:`${completion}%`}}/></div><div className="badge"><span className={`dot ${codexWeek?.used_percent>=90?'warn':''}`}></span>Codex {codexWeek?.used_percent??'—'}%</div></>}
function Header({data,reload,showHistoricalProviders,setShowHistoricalProviders}){return <div className="compact-hero"><Panel className="hero-main compact"><div className="hero-title-row"><motion.div className="pi-logo-wrap compact" initial={{opacity:0,scale:.75,rotate:-8}} animate={{opacity:1,scale:1,rotate:0}} transition={{type:'spring',stiffness:120,damping:14}} whileHover={{scale:1.05,rotate:2}}><motion.img className="pi-logo compact" src="/assets/pi_transparent_512.webp" alt="Running Pi" animate={{y:[0,-3,0]}} transition={{duration:4.5,repeat:Infinity,ease:'easeInOut'}}/></motion.div><h1>Running Pi Dashboard</h1><div className="header-actions"><motion.button className="action" whileHover={{scale:1.04}} whileTap={{scale:.96}} onClick={()=>reload(true)}>Refresh</motion.button><motion.button className="action" whileHover={{scale:1.04}} whileTap={{scale:.96}} onClick={()=>setShowHistoricalProviders(!showHistoricalProviders)}>{showHistoricalProviders?'Hide historical providers':'Show historical providers'}</motion.button>{data.loading&&<span className="spinner"/>}</div></div></Panel></div>}
function App(){const topRef=useRef(null);const [tab,setTab]=useState(localStorage.getItem('pidex-motion-tab')||'analytics'),[sub,setSub]=useState(localStorage.getItem('pidex-motion-sub')||'quality'),[project,setProjectRaw]=useState(localStorage.getItem('pidex-motion-project')||''),[showHistoricalProviders,setShowHistoricalProviders]=useState(localStorage.getItem('pidex-show-historical-providers')==='1');const [data,reload]=useAllData(project,{showHistoricalProviders});const summary=data.summary||{};useLayoutEffect(()=>{const update=()=>{if(topRef.current)document.documentElement.style.setProperty('--top-fixed-height',`${Math.ceil(topRef.current.getBoundingClientRect().height)}px`)};update();const ro=new ResizeObserver(update);if(topRef.current)ro.observe(topRef.current);window.addEventListener('resize',update);return()=>{ro.disconnect();window.removeEventListener('resize',update)}},[tab,sub,data.projects?.length]);useEffect(()=>{document.documentElement.classList.toggle('liquid-glass-enabled',!!window.LiquidGlassContainer)},[]);useEffect(()=>{if(project && data.projects && !visibleProjects(data.projects).some(p=>p.name===project)){setProjectRaw('');localStorage.setItem('pidex-motion-project','')}},[data.projects,project]);const setProject=v=>{setProjectRaw(v);localStorage.setItem('pidex-motion-project',v)};const pickTab=t=>{setTab(t);localStorage.setItem('pidex-motion-tab',t)};const pickSub=s=>{setSub(s);localStorage.setItem('pidex-motion-sub',s)};const setHistorical=v=>{setShowHistoricalProviders(v);localStorage.setItem('pidex-show-historical-providers',v?'1':'0');};return <><SquareField/><div className="top-fixed" ref={topRef}><Header data={data} reload={reload} showHistoricalProviders={showHistoricalProviders} setShowHistoricalProviders={setHistorical}/><div className="top-fixed-inner"><Panel className="project-panel top-menu"><ProjectMenu projects={data.projects||[]} project={project} setProject={setProject}/><nav className="tabs menu-tabs">{tabs.map(([id,label])=><motion.button key={id} className={`tab ${tab===id?'active':''}`} whileHover={{y:-2}} whileTap={{scale:.97}} onClick={()=>pickTab(id)}>{label}</motion.button>)}</nav>{tab==='analytics'&&<div className="submenu" style={{marginTop:8}}>{subtabs.map(([id,label])=><button key={id} className={`action ${sub===id?'active':''}`} onClick={()=>pickSub(id)}>{label}</button>)}</div>}</Panel><Panel className="status-card compact"><CompletionBox data={data}/></Panel></div></div><main className="app">{data.error&&<Panel className="card full bad">{String(data.error.message||data.error)}</Panel>}<AnimatePresence mode="wait"><motion.div key={tab+'-'+sub} initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}>{tab==='analytics'&&<><div className="grid" style={{marginBottom:16}}><Metric label="Projects" value={summary.projects}/><Metric label="Pipeline runs" value={summary.pipeline_runs}/><Metric label="Pipeline events" value={summary.pipeline_events||0}/><Metric label="Agent runs" value={summary.agent_runs}/><Metric label="Secondary artifacts" value={summary.secondary_artifacts}/><Metric label="Merge summaries" value={summary.merge_artifacts}/><Metric label="Malformed secondary" value={summary.malformed_secondary} cls={summary.malformed_secondary?'warn':'good'}/><Metric label="Estimated cost" value={money(summary.estimated_cost)}/></div>{sub==='quality'&&<Quality charts={data.charts}/>} {sub==='model-quality'&&<ModelQuality models={(data.modelQuality||{}).models||[]}/>} {sub==='pipelines'&&<Pipelines rows={data.pipelines||[]}/>} {sub==='analysis'&&<Analysis reports={data.analysisReports||[]} plans={data.analysisPlans||[]}/>} {sub==='secondary'&&<Secondary secondary={data.secondary}/>} {sub==='malformed'&&<Malformed rows={data.malformed||[]}/>} {sub==='runs'&&<Runs rows={data.runs||[]} showHistoricalProviders={showHistoricalProviders}/>}</>}{tab==='tokens'&&<TokenConsumption project={project}/>} {tab==='live'&&<Live live={data.live}/>} {tab==='limits'&&<Limits data={data} onRefresh={reload}/>}</motion.div></AnimatePresence></main></>}

createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
